<script>
        let cart = [];
        let total = 0;

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function addToCart(name, price) {
            // Cek apakah produk sudah ada di keranjang
            const existingItem = cart.find(item => item.name === name);
            
            if (existingItem) {
                // Jika sudah ada, tambah jumlahnya
                existingItem.quantity += 1;
            } else {
                // Jika belum ada, masukkan sebagai produk baru dengan quantity 1
                cart.push({ name, price, quantity: 1 });
            }
            
            updateCartUI();
            
            // Buka keranjang otomatis saat tambah barang
            const sidebar = document.getElementById('cart-sidebar');
            if(sidebar.classList.contains('translate-x-full')) toggleCart();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            
            cartItems.innerHTML = '';
            total = 0;
            let totalItems = 0; // Menghitung total seluruh barang
            
            if (cart.length === 0) {
                cartItems.innerHTML = `<div class="text-center py-20 text-stone-400 italic">Keranjang belanja kosong...</div>`;
                cartCount.innerText = 0;
                cartTotal.innerText = `Rp 0`;
                return;
            }

            cart.forEach((item, index) => {
                let itemSubtotal = item.price * item.quantity;
                total += itemSubtotal;
                totalItems += item.quantity;
                
                cartItems.innerHTML += `
                    <div class="flex flex-col gap-3 group bg-stone-50 p-4 rounded-xl relative">
                        <div class="flex justify-between items-start pr-8">
                            <div>
                                <p class="font-bold text-lg text-stone-800">${item.name}</p>
                                <p class="text-stone-500 italic text-sm">@ Rp ${item.price.toLocaleString()}</p>
                            </div>
                            <button onclick="removeItem(${index})" class="absolute top-4 right-4 text-red-400 hover:text-red-600 p-1 opacity-0 group-hover:opacity-100 transition duration-300">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        
                        <div class="flex justify-between items-center border-t border-stone-200 pt-3 mt-1">
                            <div class="flex items-center gap-3 bg-white border border-stone-200 rounded-lg px-2 py-1 shadow-sm">
                                <button onclick="changeQuantity(${index}, -1)" class="w-6 h-6 flex items-center justify-center text-stone-500 hover:text-orange-700 font-bold transition">-</button>
                                <span class="w-4 text-center font-bold text-stone-800">${item.quantity}</span>
                                <button onclick="changeQuantity(${index}, 1)" class="w-6 h-6 flex items-center justify-center text-stone-500 hover:text-orange-700 font-bold transition">+</button>
                            </div>
                            <p class="text-orange-700 font-black text-base">Rp ${itemSubtotal.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
            
            cartCount.innerText = totalItems;
            cartTotal.innerText = `Rp ${total.toLocaleString()}`;
        }

        // Fungsi untuk tombol + dan -
        function changeQuantity(index, delta) {
            cart[index].quantity += delta;
            
            // Hapus otomatis jika kuantitas jadi 0
            if (cart[index].quantity <= 0) {
                removeItem(index);
            } else {
                updateCartUI();
            }
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Pilih kopi favoritmu dulu!");
                return;
            }
            
            let message = "*ORDER GRIYA ANTIK*%0A---------------------------%0A";
            cart.forEach((item, i) => {
                // Menambahkan format kuantitas (contoh: 2x Caffe Latte - Rp 56.000)
                message += `${i+1}. *${item.name}* (x${item.quantity}) - Rp ${(item.price * item.quantity).toLocaleString()}%0A`;
            });
            message += "---------------------------%0A";
            message += `*TOTAL BAYAR: Rp ${total.toLocaleString()}*%0A%0A_Mohon konfirmasi pesanan saya._`;
            
            const phoneNumber = "6282244537515"; 
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        }
    </script>
